<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Inventory & Staff Manager</title>
    <style>
        /* Modernized Font and Reset */
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 30px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 { color: #ffffff; font-size: 2.2rem; margin-bottom: 25px; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        h2 { color: #e2e8f0; font-size: 1.4rem; font-weight: 600; margin-top: 0; }
        p { color: #94a3b8; line-height: 1.5; }

        .grid {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        @media (max-width: 1024px) {
            .grid > .card { flex: 1 1 calc(50% - 20px); }
        }
        @media (max-width: 768px) {
            .grid > .card { flex: 1 1 100%; }
        }

        .card {
            background-color: #1e293b;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            flex: 1;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            margin: 8px 0 15px 0;
            border: 1px solid #475569;
            border-radius: 8px;
            background-color: #0f172a;
            color: #f8fafc;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        button:hover { background-color: #2563eb; }

        .export-btn {
            background-color: #10b981;
            margin-bottom: 20px;
            width: auto;
            padding: 12px 25px;
        }
        .export-btn:hover { background-color: #059669; }

        .logout-btn { width: auto; background-color: #ef4444; float: right; padding: 10px 20px; }

        .delete-btn { background-color: #ef4444; padding: 6px 10px; font-size: 0.8rem; width: auto; }
        .edit-btn { background-color: #f59e0b; padding: 6px 10px; font-size: 0.8rem; width: auto; margin-right: 5px; }

        .warning-box {
            background-color: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid #ef4444;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        .expenditure-box {
            background-color: rgba(16, 185, 129, 0.1);
            color: #6ee7b7;
            border: 1px solid #10b981;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            margin-bottom: 25px;
        }

        .history-section {
            background-color: #1e293b;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
            margin-bottom: 30px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            margin-bottom: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }
        th { background-color: #0f172a; color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="login-screen" class="container">
    <h1>System Login</h1>
    <div class="grid">
        <div class="card">
            <h2>Employee Portal</h2>
            <input type="email" id="emp-email" placeholder="Email">
            <input type="password" id="emp-password" placeholder="Password">
            <button onclick="login('employee')">Login</button>
        </div>
        <div class="card">
            <h2>Admin Portal</h2>
            <input type="email" id="admin-email" placeholder="Admin Email">
            <input type="password" id="admin-password" placeholder="Password">
            <button onclick="login('admin')">Login</button>
        </div>
    </div>
    <p id="login-error" style="color: #ef4444; display: none; text-align: center;">Invalid Credentials</p>
</div>

<div id="admin-dashboard" class="container" style="display: none;">
    <button class="logout-btn" onclick="logout()">Logout</button>
    <h1>Admin Dashboard</h1>

    <button class="export-btn" onclick="exportToExcel()">Download Excel Report</button>

    <div id="total-expenditure" class="expenditure-box">Total Expenditure: $0.00</div>
    <div id="low-stock-warning" class="warning-box" style="display: none;"></div>

    <div class="grid">
        <div class="card">
            <h2>New Inventory</h2>
            <input type="text" id="inv-product" placeholder="Product Name">
            <input type="number" id="inv-qty" placeholder="Quantity">
            <input type="number" id="inv-price" placeholder="Total Price ($)">
            <button onclick="addInventory()">Add Product</button>
        </div>

        <div class="card">
            <h2>Assign Item</h2>
            <input type="text" id="assign-emp" placeholder="Employee Name">
            <input type="text" id="assign-product" placeholder="Product Name">
            <input type="number" id="assign-qty" placeholder="Quantity">
            <button onclick="assignItem()">Confirm Assignment</button>
        </div>

        <div class="card">
            <h2>Register Employee</h2>
            <input type="text" id="reg-name" placeholder="Full Name">
            <input type="number" id="reg-age" placeholder="Age">
            <select id="reg-gender">
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
            <button onclick="registerEmployee()">Register</button>
        </div>
    </div>

    <div class="history-section">
        <h2>Employee Directory</h2>
        <table id="admin-employee-table"></table>

        <h2>Master Inventory</h2>
        <table id="admin-inventory-table"></table>

        <h2>Assignment History</h2>
        <table id="admin-assign-table"></table>
    </div>
</div>

<div id="employee-dashboard" class="container" style="display: none;">
    <button class="logout-btn" onclick="logout()">Logout</button>
    <h1>Employee View</h1>
    <div class="history-section">
        <h2>Inventory Status</h2>
        <table id="employee-inventory-table"></table>
        <h2>My Assignments</h2>
        <table id="employee-assign-table"></table>
    </div>
</div>

<script>
    let inventory = JSON.parse(localStorage.getItem('inventoryData')) || [];
    let assignments = JSON.parse(localStorage.getItem('assignmentsData')) || [];
    let employees = JSON.parse(localStorage.getItem('employeeData')) || [];

    function saveData() {
        localStorage.setItem('inventoryData', JSON.stringify(inventory));
        localStorage.setItem('assignmentsData', JSON.stringify(assignments));
        localStorage.setItem('employeeData', JSON.stringify(employees));
    }

    // --- LOGIC ---

    function login(role) {
        if (role === 'admin' && document.getElementById('admin-email').value === 'admin@gmail.com' && document.getElementById('admin-password').value === '261999') {
            showDashboard('admin-dashboard');
            updateAdminUI();
        } else if (role === 'employee' && document.getElementById('emp-password').value === '202003') {
            showDashboard('employee-dashboard');
            updateEmployeeUI();
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    }

    function showDashboard(id) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById(id).style.display = 'block';
    }

    function logout() { location.reload(); }

    function registerEmployee() {
        const name = document.getElementById('reg-name').value.trim();
        const age = document.getElementById('reg-age').value;
        const gender = document.getElementById('reg-gender').value;

        if (name && age && gender) {
            employees.push({ name, age, gender });
            saveData();
            document.getElementById('reg-name').value = '';
            document.getElementById('reg-age').value = '';
            document.getElementById('reg-gender').value = '';
            updateAdminUI();
        } else { alert("Fill all employee fields"); }
    }

    function addInventory() {
        const name = document.getElementById('inv-product').value.trim();
        const qty = parseInt(document.getElementById('inv-qty').value);
        const price = parseFloat(document.getElementById('inv-price').value);

        if (name && qty > 0) {
            let item = inventory.find(i => i.name.toLowerCase() === name.toLowerCase());
            if (item) { item.qty += qty; item.price += price; }
            else { inventory.push({ name, qty, price }); }
            saveData();
            updateAdminUI();
        }
    }

    function assignItem() {
        const empName = document.getElementById('assign-emp').value.trim();
        const product = document.getElementById('assign-product').value.trim();
        const qty = parseInt(document.getElementById('assign-qty').value);

        // VALIDATION: Check if employee exists
        const empExists = employees.find(e => e.name.toLowerCase() === empName.toLowerCase());
        if (!empExists) {
            alert("Error: This employee is not registered in the system!");
            return;
        }

        let item = inventory.find(i => i.name.toLowerCase() === product.toLowerCase());
        if (item && item.qty >= qty) {
            item.qty -= qty;
            assignments.push({ empName, product: item.name, qty, date: new Date().toLocaleDateString() });
            saveData();
            updateAdminUI();
        } else { alert("Stock unavailable or product not found"); }
    }

    // --- UI ---

    function updateAdminUI() {
        renderTable('admin-employee-table', ['Name', 'Age', 'Gender', 'Actions'], employees, (e, i) => `
            <td>${e.name}</td><td>${e.age}</td><td>${e.gender}</td>
            <td><button class="delete-btn" onclick="deleteItem('employees', ${i})">Delete</button></td>
        `);

        renderTable('admin-inventory-table', ['Product', 'Stock', 'Value', 'Actions'], inventory, (item, i) => `
            <td>${item.name}</td><td>${item.qty}</td><td>$${item.price.toFixed(2)}</td>
            <td><button class="delete-btn" onclick="deleteItem('inventory', ${i})">Delete</button></td>
        `);

        renderTable('admin-assign-table', ['Employee', 'Product', 'Qty', 'Actions'], assignments, (a, i) => `
            <td>${a.empName}</td><td>${a.product}</td><td>${a.qty}</td>
            <td><button class="delete-btn" onclick="deleteItem('assignments', ${i})">Delete</button></td>
        `);

        updateExpenditure();
        checkStock();
    }

    function updateEmployeeUI() {
        renderTable('employee-inventory-table', ['Product', 'Stock'], inventory, i => `<td>${i.name}</td><td>${i.qty}</td>`);
        renderTable('employee-assign-table', ['Product', 'Qty', 'Date'], assignments, a => `<td>${a.product}</td><td>${a.qty}</td><td>${a.date}</td>`);
    }

    function renderTable(id, headers, data, rowFunc) {
        const table = document.getElementById(id);
        let html = `<tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
        data.forEach((item, i) => { html += `<tr>${rowFunc(item, i)}</tr>`; });
        table.innerHTML = html;
    }

    function deleteItem(type, index) {
        if (confirm("Delete this record?")) {
            if (type === 'employees') employees.splice(index, 1);
            if (type === 'inventory') inventory.splice(index, 1);
            if (type === 'assignments') assignments.splice(index, 1);
            saveData();
            updateAdminUI();
        }
    }

    function updateExpenditure() {
        let total = inventory.reduce((sum, i) => sum + i.price, 0);
        document.getElementById('total-expenditure').innerText = `Total Expenditure: $${total.toFixed(2)}`;
    }

    function checkStock() {
        const low = inventory.filter(i => i.qty < 5).map(i => i.name);
        const box = document.getElementById('low-stock-warning');
        if (low.length) {
            box.style.display = 'block';
            box.innerHTML = `⚠️ Low Stock: ${low.join(', ')}`;
        } else box.style.display = 'none';
    }

    // --- EXPORT TO EXCEL ---
    function exportToExcel() {
        let html = `
            <h3>Employee Directory</h3>
            <table border="1"><tr><th>Name</th><th>Age</th><th>Gender</th></tr>
            ${employees.map(e => `<tr><td>${e.name}</td><td>${e.age}</td><td>${e.gender}</td></tr>`).join('')}</table>
            <br>
            <h3>Inventory</h3>
            <table border="1"><tr><th>Product</th><th>Qty</th><th>Price</th></tr>
            ${inventory.map(i => `<tr><td>${i.name}</td><td>${i.qty}</td><td>${i.price}</td></tr>`).join('')}</table>
            <br>
            <h3>Assignments</h3>
            <table border="1"><tr><th>Employee</th><th>Product</th><th>Qty</th></tr>
            ${assignments.map(a => `<tr><td>${a.empName}</td><td>${a.product}</td><td>${a.qty}</td></tr>`).join('')}</table>
        `;

        const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Inventory_Report.xls';
        a.click();
    }
</script>
</body>
</html>
